<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Combat Urbain RPG</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #game-scene { width: 100vw; height: 100vh; background: url('1783596555675.jpg') center/cover; position: relative; cursor: crosshair; }
        
        #ui-left { position: absolute; top: 10px; left: 10px; color: white; font-weight: bold; text-shadow: 2px 2px #000; z-index: 10; }
        #ui-right { position: absolute; top: 10px; right: 10px; text-align: right; z-index: 10; }
        .stat-box { background: rgba(0, 0, 0, 0.6); padding: 8px; border-radius: 5px; color: white; font-weight: bold; }
        
        #hp-container { position: absolute; top: 38%; left: 50%; transform: translateX(-50%); width: 207px; height: 20px; border: 2px solid white; background: #333; z-index: 10; }
        #hp-bar { width: 100%; height: 100%; background: red; transition: width 0.3s; }
        
        #boss-indicator { font-size: 20px; color: red; text-shadow: 2px 2px 0 #000; margin-top: 5px; }

        #player { position: absolute !important; left: 5% !important; bottom: 5%; width: 150px; height: 200px; background-image: url('player_marine.png'); background-size: contain; background-repeat: no-repeat; z-index: 10; }
        #monster { position: absolute !important; right: 5% !important; bottom: 5%; width: 250px; height: 350px; background-image: url('boss_mecha_kaiju.png'); background-size: contain; background-repeat: no-repeat; z-index: 5; pointer-events: none; }

        #damage-text { position: absolute; top: 40%; left: 70%; font-size: 35px; font-weight: bold; color: yellow; text-shadow: 2px 2px 4px black; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        
        #shop-modal { display: none; position: absolute; top: 10%; left: 10%; width: 80%; background: rgba(0,0,0,0.95); color: white; padding: 20px; border: 2px solid white; z-index: 50; overflow-y: auto; max-height: 80vh; }
    </style>
</head>
<body>

    <div id="game-scene" onclick="attack()">
        <div id="ui-left">
            <div>Niveau: <span id="lvl">1</span> | Gold: <span id="gold">0</span></div>
            <div>Exp: <span id="xp">0</span>/<span id="xp-req">50</span></div>
            <div>Score: <span id="score">0</span></div>
        </div>
        <div id="ui-right">
            <div class="stat-box">
                CP: <span id="cp">0</span> <button onclick="ameliorerAttaque(event)">+5 DMG</button>
                <button onclick="toggleShop()">Boutique</button>
                <div id="boss-indicator">Boss 1</div>
            </div>
        </div>
        
        <div id="hp-container"><div id="hp-bar"></div></div>
        
        <div id="player"></div>
        <div id="monster"></div>
        <div id="damage-text">-10</div>
    </div>

    <div id="shop-modal">
        <h2 style="text-align:center;">Boutique</h2>
        <button onclick="toggleShop()" style="width:100%; padding:15px; background:red; color:white;">Fermer Boutique</button>
        <h3>Boosts</h3>
        <button onclick="acheterBoost(5, 30)">5 CP - 30 min Auto</button>
        <button onclick="acheterBoost(10, 120)">10 CP - 2h Auto</button>
        <button onclick="acheterBoost(100, 99999)">100 CP - Infini</button>
        <h3>Armures (+Dégâts cumulables)</h3>
        <button onclick="acheterArmure('Cuir', 5, 5)">Cuir (+5) - 5g</button>
        <button onclick="acheterArmure('Fer', 10, 10)">Fer (+10) - 10g</button>
        <button onclick="acheterArmure('Diamant', 20, 30)">Diamant (+20) - 30g</button>
        <button onclick="acheterArmure('Obsidienne', 50, 50)">Obsidienne (+50) - 50g</button>
    </div>

    <script>
        let hp = 100, maxHp = 100, xp = 0, xpRequis = 50, lvl = 1, score = 0, cp = 0, degats = 10, bossNum = 1, gold = 0, bonusArmure = 0;
        
        function attack() {
            let totalDmg = degats + bonusArmure;
            hp -= totalDmg;
            score += 100;
            
            let dmgTxt = document.getElementById('damage-text');
            dmgTxt.innerText = "-" + totalDmg;
            dmgTxt.style.opacity = "1";
            setTimeout(() => { dmgTxt.style.opacity = "0"; }, 300);

            if (hp <= 0) {
                xp += 20;
                // Progression infinie : l'xp requise augmente à chaque niveau
                if (xp >= xpRequis) { 
                    lvl++; 
                    xp = 0; 
                    cp += 1; 
                    xpRequis = Math.floor(xpRequis * 1.3); // Progression plus douce pour l'infini
                    showNotif("Niveau " + lvl + " !"); 
                }
                
                bossNum++;
                // 35% de chance de gagner 1 gold tous les 5 boss
                if (bossNum % 5 === 0 && Math.random() < 0.35) { gold += 1; }
                
                document.getElementById('boss-indicator').innerText = "Boss " + bossNum;
                maxHp = Math.floor(maxHp * 1.05); 
                hp = maxHp;
            }
            updateUI();
        }

        function toggleShop() { 
            let modal = document.getElementById('shop-modal');
            modal.style.display = (modal.style.display === 'block') ? 'none' : 'block'; 
        }

        function acheterBoost(c, t) { if(cp >= c) { cp-=c; showNotif("Boost Actif !"); updateUI(); } else showNotif("Pas assez de CP"); }
        
        function acheterArmure(n, b, p) { if(gold >= p) { gold-=p; bonusArmure+=b; showNotif(n + " équipée !"); updateUI(); } else showNotif("Pas assez d'or"); }
        
        function showNotif(text) {
            let msg = document.createElement("div");
            msg.innerText = text;
            msg.style.cssText = "position:absolute; top:20%; left:50%; transform:translateX(-50%); color:gold; font-size:18px; font-weight:bold; z-index:100; white-space:nowrap;";
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 1500);
        }

        function updateUI() {
            document.getElementById('hp-bar').style.width = (hp / maxHp * 100) + "%";
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('gold').innerText = gold;
            document.getElementById('cp').innerText = cp;
            document.getElementById('xp').innerText = xp;
            document.getElementById('xp-req').innerText = xpRequis;
            document.getElementById('score').innerText = score;
        }

        function ameliorerAttaque(e) { e.stopPropagation(); if(cp > 0) { cp--; degats += 5; updateUI(); } else { showNotif("CP insuffisant"); } }
    </script>
</body>
</html>
