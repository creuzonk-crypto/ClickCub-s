<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Geminigame</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; touch-action: manipulation; }
        #game-scene { width: 100vw; height: 100vh; background: url('1783596555675.jpg') center/cover; position: relative; }
        
        #ui-left { position: absolute; top: 10px; left: 10px; color: white; font-weight: bold; text-shadow: 2px 2px #000; z-index: 10; pointer-events: none; }
        #ui-right { position: absolute; top: 10px; right: 10px; text-align: right; z-index: 10; }
        .stat-box { background: rgba(0, 0, 0, 0.6); padding: 8px; border-radius: 5px; color: white; font-weight: bold; pointer-events: auto; }
        
        #hp-container { position: absolute; top: 38%; left: 50%; transform: translateX(-50%); width: 207px; height: 20px; border: 2px solid white; background: #333; z-index: 10; pointer-events: none; }
        #hp-bar { width: 100%; height: 100%; background: red; transition: width 0.3s; }
        
        #boss-indicator { font-size: 20px; color: red; text-shadow: 2px 2px 0 #000; margin-top: 5px; }
        #player { position: absolute !important; left: 5% !important; bottom: 5%; width: 150px; height: 200px; background-image: url('player_marine.png'); background-size: contain; background-repeat: no-repeat; z-index: 10; pointer-events: none; }
        #monster { position: absolute !important; right: 5% !important; bottom: 5%; width: 250px; height: 350px; background-image: url('boss_mecha_kaiju.png'); background-size: contain; background-repeat: no-repeat; z-index: 5; pointer-events: none; }
        #damage-text { position: absolute; top: 40%; left: 70%; font-size: 35px; font-weight: bold; color: yellow; text-shadow: 2px 2px 4px black; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        
        /* Fenêtre boutique centrée et scrollable */
        #shop-modal { display: none; position: absolute; top: 5%; left: 5%; width: 90%; height: 90vh; background: rgba(0,0,0,0.95); color: white; padding: 20px; border: 2px solid white; z-index: 50; overflow-y: auto; box-sizing: border-box; }
        button { pointer-events: auto; cursor: pointer; margin: 5px; padding: 10px; }
    </style>
</head>
<body>

    <div id="game-scene">
        <div id="ui-left">
            <div>Niveau: <span id="lvl">1</span> | Gold: <span id="gold">0</span></div>
            <div>Exp: <span id="xp">0</span>/<span id="xp-req">50</span></div>
            <div>Score: <span id="score">0</span></div>
        </div>
        <div id="ui-right">
            <div class="stat-box">
                CP: <span id="cp">0</span> <button onclick="ameliorerAttaque(event)">+5 DMG</button>
                <button onclick="toggleShop()">Boutique</button>
                <div id="boss-indicator">Boss 1</div>
            </div>
        </div>
        
        <div id="hp-container"><div id="hp-bar"></div></div>
        <div id="player"></div>
        <div id="monster"></div>
        <div id="damage-text">-10</div>
    </div>

    <div id="shop-modal">
        <h2 style="text-align:center;">Boutique</h2>
        <button onclick="toggleShop()" style="width:100%; padding:15px; background:red; color:white;">Fermer Boutique</button>
        <h3>Auto-Boost (Auto-Click 10/s + DMG x2)</h3>
        <button onclick="acheterAutoBoost(5, 30)">5 CP - 30 min</button>
        <button onclick="acheterAutoBoost(10, 120)">10 CP - 2h</button>
        <button onclick="acheterAutoBoost(100, 99999)">100 CP - Infini</button>
        <h3>Armures</h3>
        <button onclick="acheterArmure('Cuir', 5, 5)">Cuir (+5) - 5g</button>
        <button onclick="acheterArmure('Fer', 10, 10)">Fer (+10) - 10g</button>
        <button onclick="acheterArmure('Diamant', 20, 30)">Diamant (+20) - 30g</button>
        <button onclick="acheterArmure('Obsidienne', 50, 50)">Obsidienne (+50) - 50g</button>
    </div>

    <script>
        let hp = 100, maxHp = 100, xp = 0, xpRequis = 50, lvl = 1, score = 0, cp = 0, degats = 10, bossNum = 1, gold = 0, bonusArmure = 0, multDegats = 1;
        let autoInterval = null;

        document.getElementById('game-scene').addEventListener('touchstart', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            e.preventDefault();
            for(let i = 0; i < e.touches.length; i++) { attack(); }
        }, {passive: false});

        function attack() {
            let totalDmg = (degats + bonusArmure) * multDegats;
            hp -= totalDmg;
            score += 100;
            let dmgTxt = document.getElementById('damage-text');
            dmgTxt.innerText = "-" + totalDmg;
            dmgTxt.style.opacity = "1";
            setTimeout(() => { dmgTxt.style.opacity = "0"; }, 300);

            if (hp <= 0) {
                xp += 20;
                if (xp >= xpRequis) { lvl++; xp = 0; cp += 1; xpRequis = Math.floor(xpRequis * 1.3); showNotif("Niveau " + lvl + " !"); }
                bossNum++;
                // Gain Gold équilibré : 1 garanti + 50% chance d'un 2ème tous les 5 boss
                if (bossNum % 5 === 0) { 
                    gold += 1; 
                    if(Math.random() < 0.5) gold += 1;
                }
                document.getElementById('boss-indicator').innerText = "Boss " + bossNum;
                maxHp = Math.floor(maxHp * 1.05); hp = maxHp;
            }
            updateUI();
        }

        function acheterAutoBoost(c, minutes) {
            if(cp >= c) {
                cp -= c; multDegats = 2;
                if(autoInterval) clearInterval(autoInterval);
                autoInterval = setInterval(attack, 100);
                showNotif("Auto-Boost Actif !");
                if(minutes < 99999) setTimeout(() => { clearInterval(autoInterval); autoInterval = null; multDegats = 1; showNotif("Boost terminé !"); }, minutes * 60000);
            } else { showNotif("CP insuffisant"); }
            updateUI();
        }

        function toggleShop() { let m = document.getElementById('shop-modal'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
        function acheterArmure(n, b, p) { if(gold >= p) { gold-=p; bonusArmure+=b; showNotif(n + " équipée !"); updateUI(); } else showNotif("Pas assez d'or"); }
        function showNotif(text) {
            let msg = document.createElement("div");
            msg.innerText = text;
            msg.style.cssText = "position:absolute; top:20%; left:50%; transform:translateX(-50%); color:gold; font-size:18px; font-weight:bold; z-index:100; pointer-events:none;";
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 1500);
        }
        function updateUI() {
            document.getElementById('hp-bar').style.width = (hp / maxHp * 100) + "%";
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('gold').innerText = gold;
            document.getElementById('cp').innerText = cp;
            document.getElementById('xp').innerText = xp;
            document.getElementById('xp-req').innerText = xpRequis;
            document.getElementById('score').innerText = score;
        }
        function ameliorerAttaque(e) { e.stopPropagation(); if(cp > 0) { cp--; degats += 5; updateUI(); } }
    </script>
</body>
</html>
