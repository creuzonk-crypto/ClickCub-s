<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Urbain RPG</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        
        #game-scene { 
            width: 100vw; height: 100vh; 
            background-image: url('1783596555675.jpg'); 
            background-size: cover; 
            background-position: center;
            position: relative;
        }

        #ui-top { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; color: white; font-weight: bold; text-shadow: 2px 2px #000; box-sizing: border-box; z-index: 10; }
        
        #hp-container { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 200px; height: 20px; border: 2px solid white; background: #333; z-index: 10; }
        #hp-bar { width: 100%; height: 100%; background: red; transition: width 0.3s; }

        /* Le Joueur - Décalé à gauche */
        #player { 
            position: absolute; left: 5%; bottom: 5%; 
            width: 180px; height: 250px; 
            background-image: url('player_marine.png'); 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: bottom center;
            z-index: 5; 
        }

        /* Le Monstre - Décalé à droite, taille ajustée, pas de carré bleu */
        #monster { 
            position: absolute; right: 5%; bottom: 5%; 
            width: 300px; height: 420px; 
            background-image: url('boss_mecha_kaiju.png'); 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: bottom center;
            background-color: transparent !important; /* Force la suppression du fond */
            cursor: pointer; 
            z-index: 6; 
        }

        #damage-text {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            font-size: 30px; font-weight: bold; color: yellow;
            text-shadow: 2px 2px 2px black; pointer-events: none;
            opacity: 0; transition: opacity 0.2s;
        }
    </style>
</head>
<body>

    <div id="game-scene">
        <div id="ui-top">
            <div>Niveau: <span id="lvl">1</span> | Exp: <span id="xp">0</span>/20</div>
            <div>Score: <span id="score">0</span></div>
        </div>

        <div id="hp-container"><div id="hp-bar"></div></div>

        <div id="player"></div>
        <div id="monster" onclick="attack()">
            <div id="damage-text">-10</div>
        </div>
    </div>

    <script>
        let hp = 100, maxHp = 100, xp = 0, lvl = 1, score = 0;
        
        function attack() {
            hp -= 10;
            score += 100;
            
            let dmg = document.getElementById('damage-text');
            dmg.style.opacity = "1";
            setTimeout(() => { dmg.style.opacity = "0"; }, 300);

            if (hp <= 0) {
                xp += 5;
                if (xp >= 20) {
                    lvl++;
                    xp = 0;
                }
                hp = maxHp = Math.floor(maxHp * 1.2);
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('hp-bar').style.width = (hp / maxHp * 100) + "%";
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('xp').innerText = xp;
            document.getElementById('score').innerText = score;
        }
    </script>
</body>
</html>
