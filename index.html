<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Clicker RPG</title>
    <style>
        body { margin: 0; background: linear-gradient(to bottom, #87CEEB 50%, #F4D03F 50%); height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; }
        #game-area { width: 90vw; height: 60vh; border: 4px solid #333; position: relative; background: linear-gradient(to right, #F4D03F 50%, #3498DB 50%); }
        #player { position: absolute; left: 10%; bottom: 20%; width: 50px; height: 80px; background: red; border: 2px solid blue; }
        #monster { position: absolute; right: 10%; bottom: 20%; width: 60px; height: 60px; background: green; }
        #ui { text-align: center; color: white; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Niveau: <span id="lvl">1</span> | Exp: <span id="xp">0</span>/20</h1>
        <h2>Dégâts: <span id="dmg">1</span></h2>
    </div>
    <div id="game-area" onclick="attack()">
        <div id="player"></div>
        <div id="monster"></div>
    </div>
    <p>Vie du monstre: <span id="hp">10</span></p>

    <script>
        let hp = 10, maxHp = 10, xp = 0, lvl = 1, dmg = 1;
        
        function attack() {
            hp -= dmg;
            if (hp <= 0) {
                xp += 5;
                if (xp >= 20) {
                    lvl++;
                    xp = 0;
                    dmg++;
                    maxHp = Math.floor(maxHp * 1.5); // Vie exponentielle
                }
                hp = maxHp;
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('hp').innerText = hp;
            document.getElementById('xp').innerText = xp;
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('dmg').innerText = dmg;
        }
    </script>
</body>
</html>
