<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Urbain RPG</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* Scène avec ton image de fond */
        #game-scene { 
            width: 100vw; height: 100vh; 
            background-image: url('1783596555675.jpg'); 
            background-size: cover; 
            background-position: center;
            position: relative;
        }

        /* Barre d'interface en haut */
        #ui-top { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; color: white; font-weight: bold; text-shadow: 2px 2px #000; box-sizing: border-box; z-index: 10; }
        
        /* Barre de vie du monstre */
        #hp-container { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 200px; height: 20px; border: 2px solid white; background: #333; z-index: 10; }
        #hp-bar { width: 100%; height: 100%; background: red; transition: width 0.3s; }

        /* Personnages (placeholders) */
           #player { 
        position: absolute; 
        left: 10%; bottom: 10%; 
        width: 140px; 
        height: 200px; 
        background-image: url('player_marine.png'); 
        background-size: contain; 
        background-repeat: no-repeat; 
        background-position: bottom; 
        z-index: 5; 
    }

    #monster { 
        position: absolute; 
        right: 15%; bottom: 15%; 
        width: 100px; 
        height: 100px; 
        background: green; 
        cursor: pointer; 
        z-index: 5; 
    }

    </style>
</head>
<body>

    <div id="game-scene">
        <div id="ui-top">
            <div>Niveau: <span id="lvl">1</span> | Exp: <span id="xp">0</span>/20</div>
            <div>Score: <span id="score">0</span></div>
        </div>

        <div id="hp-container"><div id="hp-bar"></div></div>

        <div id="player"></div>
        <div id="monster" onclick="attack()"></div>
    </div>

    <script>
        let hp = 100, maxHp = 100, xp = 0, lvl = 1, score = 0;
        
        function attack() {
            hp -= 10;
            score += 100;
            if (hp <= 0) {
                xp += 5;
                hp = maxHp = Math.floor(maxHp * 1.2);
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('hp-bar').style.width = (hp / maxHp * 100) + "%";
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('xp').innerText = xp;
            document.getElementById('score').innerText = score;
        }
    </script>
</body>
</html>
